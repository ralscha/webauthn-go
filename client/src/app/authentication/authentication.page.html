<div class="navbar bg-base-100 shadow-sm">
  <div class="navbar-start">
    <h1 class="text-lg font-semibold">Login</h1>
  </div>
</div>

<section class="mx-auto grid min-h-[calc(100vh-4rem)] w-full max-w-md place-items-center p-4">
  <div class="card card-border w-full bg-base-100 shadow-sm">
    <div class="card-body gap-4">
      <label class="form-control w-full">
        <span class="label-text mb-2">Username</span>
        <input
          autocomplete="username webauthn"
          class="input w-full"
          name="username"
          placeholder="Tap here to show passkeys in autofill"
          type="text"
        />
      </label>

      <button (click)="login()" class="btn btn-primary btn-block" type="button">
        Sign in with passkey
      </button>

      @if (conditionalMediationAvailable()) {
        <p class="text-center text-sm opacity-70">
          Click in the username field to trigger passkey autofill.
        </p>
      }

      <a class="btn btn-block" routerLink="/registration">Registration</a>
    </div>
  </div>
</section>
