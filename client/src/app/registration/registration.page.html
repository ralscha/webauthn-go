<ion-header>
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" />
    </ion-buttons>
    <ion-title>Registration</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formRoot]="registrationForm" class="ion-margin-top">
    <ion-grid>
      <ion-row>
        <ion-col>
          <ion-item lines="none">
            <ion-input
              [errorText]="usernameError()"
              [formField]="registrationForm.username"
              [spellcheck]="false"
              autocapitalize="off"
              autocomplete="username"
              label="Username"
              labelPlacement="stacked"
              type="text"
            />
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col class="ion-margin-top">
          <ion-button
            [disabled]="registrationForm().submitting()"
            color="secondary"
            expand="block"
            type="submit"
          >
            Register
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
